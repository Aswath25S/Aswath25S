    <tspan x="400" dy="25" class="muted">. </tspan><tspan class="key">Languages</tspan>.<tspan class="key">Code</tspan><tspan class="muted"> ....... </tspan><tspan class="value">Python, TypeScript, JavaScript</tspan>
    <tspan x="400" dy="25" class="muted">. </tspan><tspan class="key">Languages</tspan>.<tspan class="key">Web</tspan><tspan class="muted"> ........ </tspan><tspan class="value">HTML, CSS, JSON</tspan>
    <tspan x="400" dy="25" class="muted">. </tspan><tspan class="key">Tools</tspan><tspan class="muted"> ................. </tspan><tspan class="value">Jupyter, Git, GitHub</tspan>
  </text>

